<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Estoque & Lista de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🛒 Estoque & Compras</span>
    </div>
  </nav>

  <div class="container mt-3">
    <ul class="nav nav-justified mb-3" id="mainTabs">
      <li class="nav-item"><button class="nav-link active w-100" data-tab="inventory">📦 Estoque</button></li>
      <li class="nav-item"><button class="nav-link w-100" data-tab="shopping">📝 Lista</button></li>
      <li class="nav-item"><button class="nav-link w-100" data-tab="data">🔄 Dados</button></li>
    </ul>

    <!-- ESTOQUE -->
    <section id="inventory" class="tab-content active">
      <form id="inv-form" class="row g-2 mb-3 p-2 bg-white rounded shadow-sm">
        <div class="col-6"><input type="text" id="inv-name" class="form-control form-control-sm" placeholder="Nome do item" required></div>
        <div class="col-3"><input type="number" id="inv-qty" class="form-control form-control-sm" placeholder="Qtd" min="0" step="any" value="1" required></div>
        <div class="col-3"><input type="number" id="inv-price" class="form-control form-control-sm" placeholder="Preço" min="0" step="0.01" value="0" required></div>
        <div class="col-12 d-grid"><button type="submit" class="btn btn-sm btn-primary">➕ Adicionar ao Estoque</button></div>
      </form>

      <div class="table-responsive bg-white rounded shadow-sm p-2">
        <table class="table table-sm table-hover mb-0" id="inv-table">
          <thead><tr class="text-muted small"><th>Item</th><th>Qtd</th><th>Últ. Preço</th><th></th></tr></thead>
          <tbody id="inv-tbody"></tbody>
        </table>
      </div>
      <p class="text-muted small text-center mt-2" id="inv-empty">Nenhum item no estoque.</p>
    </section>

    <!-- LISTA DE COMPRAS -->
    <section id="shopping" class="tab-content">
      <div class="input-group input-group-sm mb-3">
        <select id="shop-select" class="form-select">
          <option value="">Selecione do estoque...</option>
        </select>
        <button class="btn btn-outline-primary" type="button" id="add-from-inv-btn">+</button>
      </div>

      <form id="shop-form" class="row g-2 mb-3 p-2 bg-white rounded shadow-sm">
        <div class="col-6"><input type="text" id="shop-name" class="form-control form-control-sm" placeholder="Novo item" required></div>
        <div class="col-3"><input type="number" id="shop-qty" class="form-control form-control-sm" placeholder="Qtd" min="1" step="any" value="1" required></div>
        <div class="col-3"><input type="number" id="shop-price" class="form-control form-control-sm" placeholder="Preço" min="0" step="0.01" value="0" required></div>
        <div class="col-12 d-grid"><button type="submit" class="btn btn-sm btn-success">➕ Adicionar à Lista</button></div>
      </form>

      <div id="shop-list" class="mb-4"></div>
      <p class="text-muted small text-center" id="shop-empty">Lista vazia.</p>

      <div class="card total-card p-3 rounded bg-white">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h5 class="mb-0">Total Estimado:</h5>
          <h4 class="text-success fw-bold mb-0" id="shop-total">R$ 0,00</h4>
        </div>
        <div class="d-grid gap-2">
          <button id="checkout-btn" class="btn btn-primary">✅ Finalizar Compra</button>
          <button id="clear-shop-btn" class="btn btn-outline-danger btn-sm">🗑️ Limpar Lista</button>
        </div>
      </div>
    </section>

    <!-- IMPORTAR / EXPORTAR -->
    <section id="data" class="tab-content">
      <div class="card p-3 mb-3">
        <h6>📥 Exportar</h6>
        <p class="small text-muted mb-2">Baixa um arquivo JSON com todo o seu estoque e lista atual.</p>
        <button id="export-btn" class="btn btn-outline-primary btn-sm">Baixar Backup</button>
      </div>
      <div class="card p-3">
        <h6>📤 Importar</h6>
        <p class="small text-muted mb-2">Carrega um arquivo JSON. <strong>Atenção:</strong> substitui todos os dados atuais.</p>
        <input type="file" id="import-file" class="form-control form-control-sm mb-2" accept=".json">
        <button id="import-btn" class="btn btn-outline-warning btn-sm">Restaurar Backup</button>
      </div>
      <pre id="debug-preview" class="mt-3 p-2 bg-light border rounded small text-muted" style="max-height: 200px; overflow:auto;"></pre>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
